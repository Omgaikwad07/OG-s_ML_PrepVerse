<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PrepVerse | AI Interview Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
body {
  margin: 0;
  font-family: 'Roboto Mono', monospace;
  background: #05060a;
  color: white;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
  font-family: 'Orbitron';
  color: #39FF14;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 50px;
}

.text-gradient {
  background: linear-gradient(90deg, #0ABDC6, #39FF14);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* SETUP */
.setup-container {
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

.setup-box {
  width: 800px;
  background: rgba(10,10,20,0.9);
  border: 1px solid rgba(57,255,20,0.2);
  padding: 30px;
  border-radius: 16px;
}

.setup-box h2 {
  font-family: 'Orbitron';
  color: #39FF14;
  margin-bottom: 20px;
}

/* GRID STRUCTURE */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* INPUTS */
.input-group {
  display: flex;
  flex-direction: column;
}

label {
  color: #0ABDC6;
  margin-bottom: 5px;
}

input, select {
  padding: 10px;
  background: black;
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
}

/* FULL WIDTH */
.full-width {
  grid-column: span 2;
}

/* SKILLS INPUT */
.skills-box {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  background: black;
  padding: 10px;
  border: 1px solid rgba(255,255,255,0.1);
}

.skill-tag {
  background: #0ABDC6;
  color: black;
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 12px;
}

/* BUTTON */
.btn-primary {
  margin-top: 20px;
  padding: 12px;
  width: 100%;
  background: linear-gradient(90deg, #0ABDC6, #39FF14);
  border: none;
  cursor: pointer;
}

/* INTERVIEW */
.interview-container {
  display: flex;
  justify-content: center;
  margin-top: 60px;
}

.interview-box {
  width: 700px;
  background: rgba(10,10,20,0.9);
  border: 1px solid rgba(57,255,20,0.2);
  padding: 30px;
  border-radius: 16px;
}

.hidden {
  display: none;
}

</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">PREPVERSE</div>
</nav>

<section class="hero">
  <h1>
    BUILD YOUR<br>
    <span class="text-gradient">AI INTERVIEW</span>
  </h1>
</section>

<!-- SETUP -->
<section class="setup-container" id="setupSection">
  <div class="setup-box">

    <h2>INTERVIEW CONFIGURATION</h2>

    <div class="form-grid">

      <!-- CATEGORY -->
      <div class="input-group">
        <label>Interview Category</label>
        <select id="category">
          <option>Technical</option>
          <option>Behavioral</option>
          <option>System Design</option>
          <option>HR Round</option>
        </select>
      </div>

      <!-- ROLE -->
      <div class="input-group">
        <label>Role</label>
        <select id="role">
          <option>Frontend Developer</option>
          <option>Backend Developer</option>
          <option>Full Stack Developer</option>
          <option>Software Engineer</option>
        </select>
      </div>

      <!-- EXPERIENCE -->
      <div class="input-group">
        <label>Experience Level</label>
        <select id="experience">
          <option>Fresher</option>
          <option>1-3 Years</option>
          <option>3-5 Years</option>
          <option>5+ Years</option>
        </select>
      </div>

      <!-- COMPANY -->
      <div class="input-group">
        <label>Target Company</label>
        <input type="text" id="company" placeholder="Google / Amazon / Startup">
      </div>

      <!-- RESUME -->
      <div class="input-group full-width">
        <label>Upload Resume (CV)</label>
        <input type="file" id="resume">
      </div>

      <!-- SKILLS -->
      <div class="input-group full-width">
        <label>Skills</label>
        <input type="text" id="skillInput" placeholder="Type skill & press Enter">
        <div class="skills-box" id="skillsBox"></div>
      </div>

    </div>

    <button class="btn-primary" id="startBtn">START INTERVIEW</button>

  </div>
</section>

<!-- INTERVIEW -->
<section class="interview-container hidden" id="interviewSection">
  <div class="interview-box">
    <h3 id="questionText">Preparing...</h3>
  </div>
</section>

<script>

// SKILLS HANDLING
const skillInput = document.getElementById("skillInput");
const skillsBox = document.getElementById("skillsBox");

let skills = [];

skillInput.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    const value = skillInput.value.trim();

    if (value) {
      skills.push(value);

      const tag = document.createElement("span");
      tag.className = "skill-tag";
      tag.innerText = value;

      skillsBox.appendChild(tag);
      skillInput.value = "";
    }
  }
});

// START INTERVIEW
document.getElementById("startBtn").addEventListener("click", () => {

  const config = {
    category: document.getElementById("category").value,
    role: document.getElementById("role").value,
    experience: document.getElementById("experience").value,
    company: document.getElementById("company").value,
    skills: skills
  };

  console.log("INTERVIEW CONFIG:", config);

  document.getElementById("setupSection").classList.add("hidden");
  document.getElementById("interviewSection").classList.remove("hidden");

  document.getElementById("questionText").innerText =
    "Interview starting based on your profile...";
});

</script>

</body>
</html>
